name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

      - name: Build app bundle
        run: |
          pyinstaller --windowed --name PdfAWord --collect-all pdf2docx --collect-all fitz run.py

      - name: Create zip artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/PdfAWord.app dist/PdfAWord-macOS.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfAWord-macOS
          path: dist/PdfAWord-macOS.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PdfAWord-macOS.zip
