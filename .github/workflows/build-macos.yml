name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

      - name: Build macOS icon
        run: |
          mkdir -p build/PdfAWord.iconset
          sips -z 16 16 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_16x16.png
          sips -z 32 32 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_32x32.png
          sips -z 64 64 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_128x128.png
          sips -z 256 256 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_256x256.png
          sips -z 512 512 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_512x512.png
          sips -z 1024 1024 assets/pdfaword-icon.png --out build/PdfAWord.iconset/icon_512x512@2x.png
          iconutil -c icns build/PdfAWord.iconset -o assets/pdfaword-icon.icns

      - name: Build app bundle
        run: |
          pyinstaller --windowed --name PdfAWord --icon assets/pdfaword-icon.icns --collect-all pdf2docx --collect-all fitz run.py

      - name: Create zip artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/PdfAWord.app dist/PdfAWord-macOS.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfAWord-macOS
          path: dist/PdfAWord-macOS.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PdfAWord-macOS.zip
