name: Build Windows installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION=$(python - <<'PY'
          from pdf_to_word_app import __version__
          print(__version__)
          PY
          )
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Build executable
        run: pyinstaller --noconsole --onefile --name PdfAWord --icon assets/pdfaword-icon.ico --collect-all pdf2docx --collect-all fitz run.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc "/DMyAppVersion=$env:APP_VERSION" installer\windows\PdfAWord.iss

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfAWord-Windows-Installer
          path: dist/installer/PdfAWord-Setup-*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/PdfAWord-Setup-*.exe
